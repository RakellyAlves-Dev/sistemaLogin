<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Console - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-app: #fafafa;
            --panel-bg: #ffffff;
            --text-title: #0a0a0a;
            --text-body: #444444;
            --text-muted: #666666;
            --border-subtle: #eaeaea;
            --primary: #0a0a0a;
            --primary-hover: #262626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.01em;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-title);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.02);
            animation: cardEntry 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            text-align: center;
        }

        .brand-logo {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .brand-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-title);
        }

        .brand-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #a3a3a3;
            font-size: 1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-size: 0.95rem;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            background-color: #fcfcfc;
            outline: none;
            transition: all 0.2s ease;
            color: var(--text-title);
        }

        .input-wrapper input:focus {
            border-color: #a3a3a3;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.03);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .feedback-message {
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
        }

        .switch-auth-mode {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-subtle);
            padding-top: 20px;
        }

        .switch-auth-mode a {
            color: var(--text-title);
            text-decoration: none;
            font-weight: 600;
        }

        .switch-auth-mode a:hover {
            text-decoration: underline;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-header">
            <div class="brand-logo"><i class="fa-solid fa-cube"></i></div>
            <h1>Acessar o Sistema</h1>
            <p>Insira suas credenciais corporativas</p>
        </div>

        <form id="formLogin">
            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" required placeholder="nome@empresa.com">
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha de Acesso</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Autenticar <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div id="mensagemFeedBack" class="feedback-message"></div>

        <div class="switch-auth-mode">
            Não possui uma chave? <a href="cadastro.html">Criar Conta</a>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const msgEl = document.getElementById('mensagemFeedBack');

            try {
                const resposta = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    msgEl.style.color = 'green';
                    msgEl.innerText = dados.mensagem + " Redirecionando...";

                    localStorage.setItem('@SistemaAuth:token', dados.token);
                    localStorage.setItem('@SistemaAuth:user', JSON.stringify(dados.usuario));

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } else {
                    msgEl.style.color = 'red';
                    msgEl.innerText = dados.mensagem || 'Usuário ou senha incorretos.';
                }
            } catch (error) {
                msgEl.style.color = 'red';
                msgEl.innerText = 'Erro ao conectar com o servidor.';
                console.error('Erro no fetch de login:', error);
            }
        });
    </script>
</body>
</html>
